<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Python Jugando</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

header {
  text-align:center;
  padding:15px;
  background:#111827;
  font-size:20px;
}

#topbar {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#020617;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

button {
  padding:10px;
  margin-top:10px;
  border:none;
  background:#22c55e;
  border-radius:6px;
  cursor:pointer;
}

.hidden { display:none; }

.option {
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.option:hover {
  background:#22c55e;
}

#progressBar {
  height:10px;
  background:#1e293b;
  margin-top:10px;
  border-radius:5px;
}

#progress {
  height:10px;
  background:#22c55e;
  width:0%;
  border-radius:5px;
}
</style>
</head>

<body>

<header>🚀 Aprende Python Jugando</header>

<div id="topbar">
  ⭐ <span id="points">0</span>
  🧱 <span id="level">1</span>
  ❤️ <span id="lives">3</span>
  🔥 <span id="streak">0</span>
</div>

<div class="card">
<h3>🎮 Juegos</h3>
<button onclick="jugar()">Adivinar número</button>
<button onclick="dados()">Dados</button>
<button onclick="ppt()">Piedra Papel Tijera</button>
<button onclick="iniciarQuiz()">Quiz Python</button>
<button onclick="ranking()">Ranking</button>
</div>

<div class="card hidden" id="quizBox"></div>

<script>

// ===== DATA =====
let puntos = localStorage.getItem("puntos") || 0;
let vidas = localStorage.getItem("vidas") || 3;
let streak = localStorage.getItem("streak") || 0;

function nivel(){
  return Math.floor(puntos/50)+1;
}

function actualizar(){
  document.getElementById("points").innerText=puntos;
  document.getElementById("level").innerText=nivel();
  document.getElementById("lives").innerText=vidas;
  document.getElementById("streak").innerText=streak;
}

// ===== SISTEMA =====
function sumar(p){
  puntos=parseInt(puntos)+p;
  streak++;
  guardar();
}

function perderVida(){
  vidas--;
  streak=0;
  if(vidas<=0){
    alert("💀 Game Over");
    vidas=3;
    puntos=0;
  }
  guardar();
}

function guardar(){
  localStorage.setItem("puntos",puntos);
  localStorage.setItem("vidas",vidas);
  localStorage.setItem("streak",streak);
  actualizar();
}

// ===== JUEGOS =====
function jugar(){
  let n=Math.floor(Math.random()*10)+1;
  let i=prompt("1-10");

  if(parseInt(i)===n){
    alert("🔥 bien");
    sumar(10);
  } else {
    alert("❌ era "+n);
    perderVida();
  }
}

function dados(){
  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;

  if(d1+d2>7){
    alert("🔥 ganaste");
    sumar(5);
  } else {
    perderVida();
  }
}

function ppt(){
  let o=["piedra","papel","tijera"];
  let cpu=o[Math.floor(Math.random()*3)];
  let u=prompt("piedra/papel/tijera");

  if(u===cpu){
    alert("empate");
  } else if(
    (u==="piedra"&&cpu==="tijera")||
    (u==="papel"&&cpu==="piedra")||
    (u==="tijera"&&cpu==="papel")
  ){
    sumar(10);
  } else {
    perderVida();
  }
}

// ===== QUIZ =====
let preguntas=[
{q:"Python es...",o:["lenguaje","db","so"],c:0},
{q:"print sirve para...",o:["mostrar","guardar","borrar"],c:0},
{q:"# es...",o:["comentario","variable","loop"],c:0}
];

let i=0;
let correct=0;

function iniciarQuiz(){
  if(nivel()<2){
    alert("🔒 nivel 2");
    return;
  }

  i=0;
  correct=0;
  document.getElementById("quizBox").classList.remove("hidden");
  mostrar();
}

function mostrar(){
  let p=preguntas[i];

  let html=`<h3>${p.q}</h3>
  <div id="progressBar"><div id="progress" style="width:${(i/preguntas.length)*100}%"></div></div>`;

  p.o.forEach((op,index)=>{
    html+=`<div class="option" onclick="resp(${index})">${op}</div>`;
  });

  document.getElementById("quizBox").innerHTML=html;
}

function resp(x){
  if(x===preguntas[i].c){
    correct++;
    sumar(5);
  } else {
    perderVida();
  }

  i++;

  if(i<preguntas.length){
    mostrar();
  } else {
    document.getElementById("quizBox").innerHTML="🎉 Fin: "+correct;
  }
}

// ===== RANKING =====
function ranking(){
  let name=prompt("nombre");
  let r=JSON.parse(localStorage.getItem("rank"))||[];

  r.push({name,puntos});
  r.sort((a,b)=>b.puntos-a.puntos);

  localStorage.setItem("rank",JSON.stringify(r));

  let txt="🏆\n";
  r.slice(0,5).forEach((p,i)=>{
    txt+=`${i+1}. ${p.name} ${p.puntos}\n`;
  });

  alert(txt);
}

window.onload=actualizar;

</script>

</body>
</html>
