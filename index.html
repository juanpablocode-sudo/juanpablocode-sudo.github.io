<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Juan Pablo Code | Aprende Python Jugando</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111827;
      text-align: center;
    }
    <div id="user-panel" style="text-align:center; padding:10px;">
  ⭐ Puntos: <span id="points">0</span> | 
  🧱 Nivel: <span id="level">1</span>
</div>

    .hero {
      padding: 60px 20px;
      text-align: center;
      background: linear-gradient(to right, #0b0f1a, #1e293b);
    }

    .hero h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .hero p {
      color: #9ca3af;
      font-size: 18px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .section {
      padding: 30px 20px;
      max-width: 1100px;
      margin: auto;
    }

    .section h2 {
      margin-bottom: 20px;
      text-align: center;
    }

    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 12px;
      transition: 0.3s;
      text-align: center;
    }

    .card:hover {
      transform: translateY(-5px) scale(1.03);
      box-shadow: 0 0 20px #22c55e;
    }

    .card h3 {
      margin-bottom: 10px;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #22c55e;
      cursor: pointer;
      font-weight: bold;
    }

    footer {
      text-align: center;
      padding: 20px;
      color: #6b7280;
    }

    /* 📱 Responsive ajustes */
    @media (max-width: 600px) {
      .hero h1 {
        font-size: 28px;
      }

      .hero p {
        font-size: 16px;
      }
    }
  </style>
</head>

<body>

<header>
  🚀 Juan Pablo Code
</header>

<section class="hero">
  <h1>Aprendé Python jugando</h1>
  <p>Mini juegos y proyectos interactivos</p>
  <button class="btn">Explorar</button>
</section>

<section class="section">
  <h2>🎮 Juegos</h2>

  <div class="cards">

    <div class="card">
      <h3>🎯 Adivina el número</h3>
      <button onclick="jugar()">Jugar</button>
    </div>

    <div class="card">
      <h3>🎲 Dados</h3>
      <button onclick="dados()">Jugar</button>
    </div>

    <div class="card">
      <h3>✊ Piedra Papel Tijera</h3>
      <button onclick="ppt()">Jugar</button>
    </div>

    <div class="card">
      <h3>🔐 Generador de contraseña</h3>
      <button onclick="password()">Generar</button>
    </div>

    <div class="card">
      <h3>❓ Quiz Python</h3>
      <button onclick="quiz()">Jugar</button>
    </div>

  </div>
</section>

<footer>
  © 2026 Juan Pablo Code
</footer>
  

<script>
  let puntos = localStorage.getItem("puntos") || 0;

function actualizarUI() {
  document.getElementById("points").innerText = puntos;
  document.getElementById("level").innerText = Math.floor(puntos / 50) + 1;
}

function sumarPuntos(valor) {
  puntos = parseInt(puntos) + valor;
  localStorage.setItem("puntos", puntos);
  actualizarUI();
}

window.onload = actualizarUI;
function jugar() {
  let numero = Math.floor(Math.random() * 10) + 1;
  let intento = prompt("Adivina un número del 1 al 10");

  if (parseInt(intento) === numero) {
    alert("🔥 ¡Ganaste!");
    sumarPuntos(10);
  } else {
    alert("❌ Era " + numero);
  }
}

function dados() {
  let d1 = Math.floor(Math.random() * 6) + 1;
  let d2 = Math.floor(Math.random() * 6) + 1;
  if (d1 + d2 > 7) {
  sumarPuntos(5);
}

  alert("🎲 Sacaste: " + d1 + " y " + d2);
}

function ppt() {
  let opciones = ["piedra", "papel", "tijera"];
  let cpu = opciones[Math.floor(Math.random() * 3)];
  let user = prompt("Elegí: piedra, papel o tijera");

  if (user === cpu) {
    alert("Empate 🤝");
  } else if (
    (user === "piedra" && cpu === "tijera") ||
    (user === "papel" && cpu === "piedra") ||
    (user === "tijera" && cpu === "papel")
  ) {
    alert("🔥 Ganaste! CPU eligió " + cpu);
    sumarPuntos(10);
  } else {
    alert("❌ Perdiste. CPU eligió " + cpu);
  }
}

function password() {
  let chars = "abcdefghijklmnopqrstuvwxyz1234567890!@#";
  let pass = "";

  for (let i = 0; i < 8; i++) {
    pass += chars[Math.floor(Math.random() * chars.length)];
  }

  alert("🔐 Tu contraseña: " + pass);
}

function quiz() {
  let respuesta = prompt("¿Python es tipado dinámicamente? (si/no)");

  if (respuesta.toLowerCase() === "si") {
    alert("✅ Correcto!");
    sumarPuntos(10);
  } else {
    alert("❌ Incorrecto");
  }
}
</script>

</body>
</html>
