<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juan Pablo Code | Aprende Python Jugando</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b0f1a;
  color: white;
}

header {
  text-align: center;
  padding: 20px;
  background: #111827;
  font-size: 24px;
}

#user-panel {
  text-align: center;
  padding: 10px;
  background: #020617;
}

.section {
  padding: 20px;
  max-width: 1000px;
  margin: auto;
}

.cards {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 20px;
}

.card {
  background: #1e293b;
  padding: 20px;
  border-radius: 10px;
  text-align: center;
}

button {
  margin-top: 10px;
  padding: 10px;
  border: none;
  background: #22c55e;
  border-radius: 6px;
  cursor: pointer;
}

.hidden {
  display: none;
}

/* QUIZ UI */
#quizBox {
  background: #020617;
  padding: 20px;
  border-radius: 10px;
  margin-top: 20px;
}

.option {
  background: #1e293b;
  margin: 10px 0;
  padding: 10px;
  cursor: pointer;
  border-radius: 5px;
}

.option:hover {
  background: #22c55e;
}
</style>
</head>

<body>

<header>🚀 Juan Pablo Code</header>

<div id="user-panel">
⭐ Puntos: <span id="points">0</span> |
🧱 Nivel: <span id="level">1</span>
</div>

<section class="section">
<h2>🎮 Juegos</h2>

<div class="cards">

<div class="card">
<h3>🎯 Adivina el número</h3>
<button onclick="jugar()">Jugar</button>
</div>

<div class="card">
<h3>🎲 Dados</h3>
<button onclick="dados()">Jugar</button>
</div>

<div class="card">
<h3>✊ Piedra Papel Tijera</h3>
<button onclick="ppt()">Jugar</button>
</div>

<div class="card" id="quizCard">
<h3>🧠 Quiz Python</h3>
<button onclick="iniciarQuiz()">Jugar</button>
</div>

<div class="card" id="rankingCard">
<h3>🏆 Ranking</h3>
<button onclick="mostrarRanking()">Ver</button>
</div>

</div>

<div id="quizBox" class="hidden"></div>

</section>

<script>

// ===== SISTEMA =====
let puntos = localStorage.getItem("puntos") || 0;

function nivel() {
  return Math.floor(puntos / 50) + 1;
}

function actualizarUI() {
  document.getElementById("points").innerText = puntos;
  document.getElementById("level").innerText = nivel();
}

function sumarPuntos(v) {
  puntos = parseInt(puntos) + v;
  localStorage.setItem("puntos", puntos);
  actualizarUI();
  desbloquear();
}

// ===== DESBLOQUEO =====
function desbloquear() {
  if (nivel() < 2) {
    document.getElementById("quizCard").style.opacity = "0.3";
  }
}

// ===== JUEGOS =====
function jugar() {
  let n = Math.floor(Math.random()*10)+1;
  let i = prompt("Número 1-10");

  if (parseInt(i) === n) {
    alert("🔥 Ganaste");
    sumarPuntos(10);
  } else {
    alert("❌ Era " + n);
  }
}

function dados() {
  let d1 = Math.floor(Math.random()*6)+1;
  let d2 = Math.floor(Math.random()*6)+1;
  alert("🎲 " + d1 + " y " + d2);

  if (d1+d2 > 7) sumarPuntos(5);
}

function ppt() {
  let o = ["piedra","papel","tijera"];
  let cpu = o[Math.floor(Math.random()*3)];
  let u = prompt("piedra/papel/tijera");

  if (u === cpu) {
    alert("Empate");
  } else if (
    (u==="piedra"&&cpu==="tijera")||
    (u==="papel"&&cpu==="piedra")||
    (u==="tijera"&&cpu==="papel")
  ){
    alert("🔥 Ganaste");
    sumarPuntos(10);
  } else {
    alert("Perdiste");
  }
}

// ===== QUIZ PRO =====
let preguntas = [
{
q:"¿Qué es Python?",
o:["Lenguaje","Base de datos","Sistema"],
c:0
},
{
q:"¿Cómo imprimir?",
o:["echo()","print()","log()"],
c:1
},
{
q:"Tipo de 'hola'?",
o:["int","string","bool"],
c:1
}
];

let index = 0;
let score = 0;

function iniciarQuiz(){
  if(nivel()<2){
    alert("🔒 Desbloqueá nivel 2");
    return;
  }

  index = 0;
  score = 0;
  document.getElementById("quizBox").classList.remove("hidden");
  mostrarPregunta();
}

function mostrarPregunta(){
  let p = preguntas[index];

  let html = "<h3>"+p.q+"</h3>";

  p.o.forEach((op,i)=>{
    html += `<div class="option" onclick="responder(${i})">${op}</div>`;
  });

  document.getElementById("quizBox").innerHTML = html;
}

function responder(i){
  if(i === preguntas[index].c){
    score++;
  }

  index++;

  if(index < preguntas.length){
    mostrarPregunta();
  } else {
    document.getElementById("quizBox").innerHTML = "✅ Puntaje: "+score;
    sumarPuntos(score*10);
  }
}

// ===== RANKING =====
function mostrarRanking(){
  let r = JSON.parse(localStorage.getItem("ranking")) || [];
  let nombre = prompt("Tu nombre");

  r.push({nombre,puntos});
  r.sort((a,b)=>b.puntos-a.puntos);

  localStorage.setItem("ranking", JSON.stringify(r));

  let top = "🏆 Ranking\n";
  r.slice(0,5).forEach((p,i)=>{
    top += `${i+1}. ${p.nombre} - ${p.puntos}\n`;
  });

  alert(top);
}

// INIT
window.onload = () => {
  actualizarUI();
  desbloquear();
};

</script>

</body>
</html>
