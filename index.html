<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aprende Python Jugando</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#0b0f1a;
  color:white;
}

/* LOGIN */
#loginScreen {
  display:flex;
  height:100vh;
  justify-content:center;
  align-items:center;
}

.login-box {
  background:#1e293b;
  padding:30px;
  border-radius:10px;
  text-align:center;
}

input {
  padding:10px;
  border:none;
  border-radius:5px;
  margin-top:10px;
}

button {
  padding:10px;
  margin-top:10px;
  border:none;
  background:#22c55e;
  border-radius:6px;
  cursor:pointer;
}

.hidden { display:none; }

/* APP */
header {
  text-align:center;
  padding:15px;
  background:#111827;
}

#topbar {
  display:flex;
  justify-content:space-around;
  padding:10px;
  background:#020617;
}

.card {
  background:#1e293b;
  margin:10px;
  padding:20px;
  border-radius:10px;
  text-align:center;
}

.option {
  background:#1e293b;
  margin:10px 0;
  padding:10px;
  border-radius:5px;
  cursor:pointer;
}

.option:hover {
  background:#22c55e;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginScreen">
  <div class="login-box">
    <h2>🚀 Iniciar sesión</h2>
    <input id="username" placeholder="Tu nombre">
    <br>
    <button onclick="login()">Entrar</button>
    <p id="msg" style="color:#9ca3af;"></p>
  </div>
</div>

<!-- APP -->
<div id="app" class="hidden">

<header>Aprende Python Jugando</header>

<div id="topbar">
⭐ <span id="points">0</span>
🧱 <span id="level">1</span>
❤️ <span id="lives">3</span>
🔥 <span id="streak">0</span>
</div>

<div class="card">
<h3>🎮 Juegos</h3>
<button onclick="jugar()">Adivinar número</button>
<button onclick="dados()">Dados</button>
<button onclick="ranking()">Ranking</button>
</div>

</div>

<script>

const API = "https://backend-python-dwm0.onrender.com";

let usuario="";
let puntos=0;
let vidas=3;
let streak=0;

// LOGIN CORREGIDO
async function login(){

  let input = document.getElementById("username").value.trim();
  let msg = document.getElementById("msg");

  if(!input){
    msg.innerText = "⚠️ Escribí un nombre";
    return;
  }

  msg.innerText = "⏳ Conectando...";

  try {

    let res = await fetch(API + "/login", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username: input})
    });

    if(!res.ok){
      throw new Error("Error servidor");
    }

    let data = await res.json();

    usuario = input;
    puntos = data.points || 0;

    document.getElementById("loginScreen").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");

    actualizar();

  } catch(e){

    msg.innerText = "❌ Error conectando. Esperá 20 segundos y probá otra vez.";

    console.error(e);
  }
}

// UI
function nivel(){
  return Math.floor(puntos/50)+1;
}

function actualizar(){
  document.getElementById("points").innerText=puntos;
  document.getElementById("level").innerText=nivel();
  document.getElementById("lives").innerText=vidas;
  document.getElementById("streak").innerText=streak;
}

// SAVE
async function guardarServidor(){
  try{
    await fetch(API + "/save", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({username:usuario,points:puntos})
    });
  }catch(e){
    console.log("no guardó (render dormido)");
  }
}

// GAME
function sumar(p){
  puntos += p;
  streak++;
  guardarServidor();
  actualizar();
}

function perder(){
  vidas--;
  streak=0;

  if(vidas<=0){
    alert("💀 Game Over");
    vidas=3;
    puntos=0;
  }

  actualizar();
}

// JUEGOS
function jugar(){
  let n=Math.floor(Math.random()*10)+1;
  let i=prompt("Número 1-10");

  if(parseInt(i)===n){
    sumar(10);
  } else {
    perder();
  }
}

function dados(){
  let d1=Math.floor(Math.random()*6)+1;
  let d2=Math.floor(Math.random()*6)+1;

  if(d1+d2>7){
    sumar(5);
  } else {
    perder();
  }
}

// RANKING
async function ranking(){
  try{
    let res = await fetch(API + "/ranking");
    let data = await res.json();

    let txt="🏆 Ranking\n";

    data.forEach((u,i)=>{
      txt+=`${i+1}. ${u[0]} - ${u[1].points}\n`;
    });

    alert(txt);

  }catch(e){
    alert("Esperá 20 segundos (servidor dormido)");
  }
}

</script>

</body>
</html>
