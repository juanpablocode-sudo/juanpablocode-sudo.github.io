<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Juan Pablo Code | Aprende Python Jugando</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b0f1a;
      color: white;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
      background: #111827;
    }

    .hero {
      padding: 60px;
      text-align: center;
      background: linear-gradient(to right, #0b0f1a, #1e293b);
    }

    .hero h1 {
      font-size: 40px;
    }

    .btn {
      margin-top: 20px;
      padding: 12px 20px;
      background: #22c55e;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    .section {
      padding: 20px;
    }

    .cards {
      display: flex;
      gap: 20px;
    }

    .card {
      background: #1e293b;
      padding: 20px;
      border-radius: 10px;
      width: 200px;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.1);
      box-shadow: 0 0 20px #22c55e;
    }

    button {
      margin-top: 10px;
      padding: 8px;
      border: none;
      border-radius: 5px;
      background: #22c55e;
      cursor: pointer;
    }
  </style>
</head>

<body>

<header>
  🚀 Juan Pablo Code
</header>

<section class="hero">
  <h1>Aprendé Python jugando</h1>
  <button class="btn">Explorar</button>
</section>

<section class="section">
  <h2>🎮 Juegos</h2>

  <div class="cards">

    <div class="card">
      <h3>🎯 Adivina el número</h3>
      <button onclick="jugar()">Jugar</button>
    </div>

    <div class="card">
      <h3>🎲 Dados</h3>
      <button onclick="dados()">Jugar</button>
    </div>

  </div>
</section>

<script>
function jugar() {
  let numero = Math.floor(Math.random() * 10) + 1;
  let intento = prompt("Adivina un número del 1 al 10");

  if (parseInt(intento) === numero) {
    alert("🔥 ¡Ganaste!");
  } else {
    alert("❌ Era " + numero);
  }
}

function dados() {
  let d1 = Math.floor(Math.random() * 6) + 1;
  let d2 = Math.floor(Math.random() * 6) + 1;

  alert("🎲 Sacaste: " + d1 + " y " + d2);
}
</script>

</body>
</html>
